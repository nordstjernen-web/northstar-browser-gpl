<!doctype html><meta charset=utf-8><style>
.bg{background:#06c url(img.png) no-repeat right center;height:80px;color:#fff;padding:10px}
.multi{background:linear-gradient(#fff8,#fff8),#3a7;height:60px;padding:10px}
.pos{background-position:center;background-repeat:no-repeat;background-color:#eee;background-image:url(img.png);height:100px;border:1px solid #999}
.pos2{background-position:top right;background-repeat:no-repeat;background-color:#fee;background-image:url(img.png);height:100px;border:1px solid #c99}
.fs{font:italic bold 22px/1.4 serif}
</style>
<div class=bg>bg image right</div>
<div class=multi>overlay gradient</div>
<div class=pos>centered bg</div>
<div class=pos2 id=bg-vfirst>vertical-first bg position</div>
<p class=fs>font shorthand</p>
