<!doctype html><meta charset=utf-8><style>
body{font:16px sans-serif;margin:20px}
p::first-line{color:red;font-weight:bold}
</style>
<p>First line should be red and bold.<br>Second line stays normal black.</p>
<p style="width:200px">A longer paragraph without explicit breaks so the first visual line wraps naturally and only that line is colored.</p>
