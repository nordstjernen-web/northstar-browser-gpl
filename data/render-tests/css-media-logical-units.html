<!doctype html>
<meta charset="utf-8">
<title>CSS Media Queries, Logical Radii, and Viewport Units</title>
<style>
body {
  margin: 24px;
  font: 15px sans-serif;
  background: rgb(246 247 249);
  color: #1f2937;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}
.panel {
  background: white;
  border: 2px solid #d1d5db;
  border-radius: 8px;
  padding: 14px;
  min-height: 136px;
}
.label {
  font-weight: 700;
  margin-bottom: 10px;
}
.chip {
  display: inline-block;
  margin: 4px;
  padding: 8px 11px;
  border-radius: 5px;
  background: #e5e7eb;
  color: #374151;
}
.units .wide {
  width: calc(10svmin + 2cap + 4q);
  background: oklch(58% 0.16 218 / 92%);
  color: white;
}
.units .tall {
  width: calc(8dvmax - 1ic);
  background: oklch(61% 0.16 142 / 92%);
  color: white;
}
.logical {
  border: 5px solid oklch(58% 0.18 35);
  border-start-start-radius: 28px;
  border-start-end-radius: 4px;
  border-end-end-radius: 28px;
  border-end-start-radius: 4px;
}
.logical .chip {
  background: oklch(56% 0.15 280 / 92%);
  color: white;
}
.media .ratio,
.media .resolution,
.media .capability {
  background: #e5e7eb;
}
@media (1 < aspect-ratio < 2) {
  .media .ratio {
    background: oklch(60% 0.17 144 / 92%);
    color: white;
  }
}
@media (resolution >= 1dppx) and (min-resolution: 96dpi) {
  .media .resolution {
    background: oklch(62% 0.16 235 / 92%);
    color: white;
  }
}
@media (color-gamut: srgb) and (scripting: enabled) and (display-mode: browser) and (update: fast) {
  .media .capability {
    background: color-mix(in srgb, oklch(62% 0.18 310) 55%, rgb(220 0 60));
    color: white;
  }
}
@media (dynamic-range: standard) and (overflow-block: scroll) and (grid: 0) {
  .extra .chip {
    background: oklab(58% -0.07 0.12 / 92%);
    color: white;
  }
}
</style>
<div class="grid">
  <section class="panel units">
    <div class="label">Viewport and font-relative units</div>
    <span class="chip wide">svmin cap q</span>
    <span class="chip tall">dvmax</span>
  </section>
  <section class="panel logical">
    <div class="label">Logical corner radii</div>
    <span class="chip">start/end corners</span>
  </section>
  <section class="panel media">
    <div class="label">Media query features</div>
    <span class="chip ratio">aspect-ratio</span>
    <span class="chip resolution">resolution</span>
    <span class="chip capability">capabilities</span>
  </section>
  <section class="panel extra">
    <div class="label">Additional media capabilities</div>
    <span class="chip">dynamic range and overflow</span>
  </section>
</div>
