<!doctype html><meta charset=utf-8><style>
body{font:15px sans-serif;margin:20px}
.fw{display:flex;flex-wrap:wrap;gap:6px;width:260px;border:1px solid #ccc;padding:4px}
.fw div{background:#69c;color:#fff;padding:8px;width:70px}
.fl::first-letter{font-size:200%;color:#c33;font-weight:bold}
.tt{text-transform:uppercase}.cap{text-transform:capitalize}
.ib{display:inline-block;width:50px;height:50px;background:#3a7;vertical-align:middle}
</style>
<div class=fw><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div></div>
<p class=fl>First letter of this paragraph should be a large red drop cap rendered distinctly.</p>
<p class=tt>uppercase me</p><p class=cap>capitalize each word</p>
<p>text <span class=ib></span> baseline <span class=ib style="height:30px"></span> end</p>
