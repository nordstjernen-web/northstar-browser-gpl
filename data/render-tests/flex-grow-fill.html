.b>div{flex:1}.b{gap:0}

</style>
<div class="f a"><div>gap+flex1</div><div>B</div><div>C</div></div>
<div class="f b"><div>nogap+flex1</div><div>B</div><div>C</div></div>
<div class="f c"><div>1</div><div>2</div><div>1</div></div>
