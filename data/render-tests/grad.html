<!doctype html><meta charset=utf-8><style>
.g{width:180px;height:90px;display:inline-block;margin:6px;color:#fff;border-radius:10px}
.lin{background:linear-gradient(90deg,#f00,#ff0,#0f0)}
.rad{background:radial-gradient(circle,#fff,#06c)}
.con{background:conic-gradient(#f00,#0f0,#00f,#f00)}
.sh{box-shadow:4px 4px 12px rgba(0,0,0,.5);background:#fff;color:#000;border:1px solid #ccc}
</style>
<div class="g lin">linear</div><div class="g rad">radial</div><div class="g con">conic</div><div class="g sh">shadow</div>
