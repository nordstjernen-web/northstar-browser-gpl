<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Positioning</title>
<style>
body { margin: 0; padding: 0; }
.rel { position: relative; width: 300px; height: 200px; margin: 10px; }
.abs { position: absolute; top: 20px; left: 30px; width: 50px; height: 50px; }
</style>
</head>
<body>
<div class="rel">
<div class="abs"></div>
</div>
</body>
</html>
