<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Grid Order</title>
<style>
body { font: 16px sans-serif; margin: 0; padding: 16px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; }
.grid > div { padding: 6px; }
.nav { order: -1; }
</style>
</head>
<body>
<div class="grid">
<div class="main">Main Content</div>
<div class="nav">Nav Links</div>
</div>
</body>
</html>
