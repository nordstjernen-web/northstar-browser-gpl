<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Table</title>
<style>
body { font: 16px sans-serif; margin: 0; padding: 16px; }
table { border-collapse: collapse; }
th, td { border: 1px solid #888; padding: 4px 8px; }
</style>
</head>
<body>
<table>
<tr><th>Name</th><th>Qty</th></tr>
<tr><td>Widget</td><td>3</td></tr>
<tr><td>Gadget</td><td>7</td></tr>
</table>
</body>
</html>
