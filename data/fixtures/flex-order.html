<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Flex Order</title>
<style>
body { font: 16px sans-serif; margin: 0; padding: 16px; }
.row { display: flex; }
.row > div { padding: 8px; }
.a { order: 3; }
.b { order: 1; }
.c { order: 2; }
</style>
</head>
<body>
<div class="row">
<div class="a">Alpha</div>
<div class="b">Bravo</div>
<div class="c">Charlie</div>
</div>
</body>
</html>
