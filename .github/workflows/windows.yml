name: windows

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: msys2/mingw64 on windows-${{ matrix.windows }}
    runs-on: windows-${{ matrix.windows }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        windows: ['2025']

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libepoxy
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-ca-certificates
            mingw-w64-x86_64-uchardet
            mingw-w64-x86_64-librsvg
            mingw-w64-x86_64-libpsl
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-libavif
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-nasm
            make
            zip

      - name: Restore ccache
        id: ccache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}\ccache
          key: ccache-windows-${{ matrix.windows }}-${{ github.sha }}
          restore-keys: |
            ccache-windows-${{ matrix.windows }}-

      - name: Configure ccache
        run: |
          export CCACHE_DIR="$RUNNER_TEMP/ccache"
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"
          ccache --max-size=500M
          ccache --zero-stats

      - name: Show toolchain versions
        run: |
          clang --version
          ccache --version | head -1
          meson --version
          ninja --version
          pkg-config --modversion gtk4
          pkg-config --modversion libcurl

      - name: Cache LGPL FFmpeg
        id: ffcache
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}\ffmpeg-lgpl
          key: ffmpeg-lgpl-win-${{ matrix.windows }}-${{ hashFiles('scripts/build-ffmpeg-lgpl.sh') }}

      - name: Provide LGPL FFmpeg (inline WebM)
        run: |
          # MSYS2's mingw FFmpeg is GPL; use a minimal LGPL one (VP9/VP8 +
          # Opus/Vorbis only). Build it once into a cached prefix (keyed on the
          # build script), then install it into the mingw prefix so meson finds
          # it via the default pkg-config path and pack-windows.sh's DLL chase
          # bundles it. WebM is required on Windows, so this must succeed.
          PREFIX="$(cygpath -u "$RUNNER_TEMP")/ffmpeg-lgpl"
          if [ ! -f "$PREFIX/lib/pkgconfig/libavcodec.pc" ]; then
            scripts/build-ffmpeg-lgpl.sh "$PREFIX"
          else
            echo "using cached LGPL FFmpeg at $PREFIX"
          fi
          cp -r "$PREFIX"/bin/. /mingw64/bin/
          cp -r "$PREFIX"/lib/. /mingw64/lib/
          cp -r "$PREFIX"/include/. /mingw64/include/
          sed -i "s|^prefix=.*|prefix=/mingw64|" /mingw64/lib/pkgconfig/libav*.pc \
                                                 /mingw64/lib/pkgconfig/libsw*.pc

      - name: Build
        id: build
        if: hashFiles('meson.build') != ''
        run: |
          set -o pipefail
          export CC="ccache clang"
          meson setup builddir --werror
          meson compile -C builddir 2>&1 | tee build.log

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Save ccache
        if: always() && steps.ccache-restore.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}\ccache
          key: ccache-windows-${{ matrix.windows }}-${{ github.sha }}

      - name: Smoke test (binary present)
        if: hashFiles('builddir/src/gtk/nordstjernen.exe') != ''
        run: |
          test -f builddir/src/gtk/nordstjernen.exe
          file builddir/src/gtk/nordstjernen.exe

      - name: Headless smoke (--print-config + about:start)
        if: hashFiles('builddir/src/gtk/nordstjernen.exe') != ''
        env:
          NS_ALLOW_ROOT: '1'
        run: |
          set -o pipefail
          ./builddir/src/gtk/nordstjernen.exe --print-config > config.txt
          head -5 config.txt
          ./builddir/src/gtk/nordstjernen.exe --headless --dump=text about:start > about.txt
          head -3 about.txt
          grep -q Nordstjernen about.txt

      - name: Upload build log
        if: always() && hashFiles('build.log') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: build-log-windows-${{ matrix.windows }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload nordstjernen binary
        if: hashFiles('builddir/src/gtk/nordstjernen.exe') != ''
        uses: actions/upload-artifact@v7
        with:
          name: nordstjernen-windows-${{ matrix.windows }}
          path: builddir/src/gtk/nordstjernen.exe
          if-no-files-found: error
          retention-days: 14

      - name: Build redistributable bundle (pack-windows.sh)
        id: pack
        if: github.event_name != 'pull_request' && hashFiles('builddir/src/gtk/nordstjernen.exe') != ''
        env:
          BUILDDIR: ${{ github.workspace }}/builddir
          NS_ALLOW_ROOT: '1'
        run: |
          set -o pipefail
          ./scripts/pack-windows.sh 2>&1 | tee pack-windows.log
          VERSION=$(grep -E "^[[:space:]]*version" meson.build | head -1 \
                    | sed -E "s/.*version: '([^']+)'.*/\1/")
          ZIP="dist/nordstjernen-${VERSION}-windows-x86_64.zip"
          ./dist/nordstjernen-win64/nordstjernen.exe --print-config > bundle-config.txt
          ./dist/nordstjernen-win64/nordstjernen.exe --headless --dump=text about:start > bundle-about.txt
          grep -q Nordstjernen bundle-about.txt
          mkdir -p isolated-launcher
          cp dist/nordstjernen-win64/nordstjernen.exe isolated-launcher/
          if ./isolated-launcher/nordstjernen.exe --print-config 2> isolated-launcher.err; then
            echo "isolated launcher unexpectedly succeeded" >&2
            exit 1
          fi
          grep -q "Extract All" isolated-launcher.err
          ( cd dist && zip -r -q "$(basename "$ZIP")" nordstjernen-win64 )
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload pack-windows log
        if: always() && hashFiles('pack-windows.log') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: pack-windows-log-${{ matrix.windows }}
          path: pack-windows.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Windows bundle zip
        if: hashFiles('dist/nordstjernen-*-windows-*.zip') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: nordstjernen-windows-${{ matrix.windows }}-zip
          path: dist/nordstjernen-*-windows-*.zip
          if-no-files-found: ignore
          retention-days: 14

      - name: Build MSIX package (pack-msix.sh)
        if: steps.pack.outcome == 'success'
        env:
          BUILDDIR: ${{ github.workspace }}/builddir
        run: |
          set -o pipefail
          ./scripts/pack-msix.sh 2>&1 | tee pack-msix.log

      - name: Upload MSIX package
        if: hashFiles('dist/*.msix') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: nordstjernen-windows-${{ matrix.windows }}-msix
          path: dist/*.msix
          if-no-files-found: ignore
          retention-days: 14
