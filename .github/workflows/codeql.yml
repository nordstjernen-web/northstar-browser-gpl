name: codeql

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  schedule:
    - cron: '27 4 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-26.04
    timeout-minutes: 45

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # C/C++ extracts without a build (buildless), so it needs none of the
          # GTK dependency stack on the analysis runner.
          - language: c-cpp
            build-mode: none
          # Kotlin can't be extracted in build-mode 'none' for an Android Gradle
          # project (the SDK classpath is required), so we build it manually and
          # let CodeQL trace the compilation.
          - language: java-kotlin
            build-mode: manual

    env:
      NDK_VERSION: '27.3.13750724'
      CMAKE_VERSION: '3.22.1'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: matrix.build-mode == 'manual'
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install NDK, CMake and platform
        if: matrix.build-mode == 'manual'
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          for attempt in 1 2 3; do
            if sdkmanager \
                "platforms;android-36" \
                "build-tools;36.0.0" \
                "ndk;${NDK_VERSION}" \
                "cmake;${CMAKE_VERSION}"; then
              echo "sdkmanager succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "sdkmanager failed on attempt ${attempt}; clearing partial downloads and retrying" >&2
            rm -rf "${ANDROID_HOME:-$ANDROID_SDK_ROOT}/.downloadIntermediates" \
                   "${ANDROID_HOME:-$ANDROID_SDK_ROOT}/.temp" 2>/dev/null || true
            sleep $((attempt * 10))
          done
          echo "sdkmanager failed after 3 attempts" >&2
          exit 1

      - name: Set up Gradle
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.14.5'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build Android app (Kotlin extraction)
        if: matrix.build-mode == 'manual'
        working-directory: android
        # CodeQL only needs the Kotlin/Java compilers traced, so compile the
        # sources instead of assembling a full APK — this skips dexing,
        # packaging, and the externalNativeBuild step the analysis ignores.
        run: gradle compileDebugSources --no-daemon --stacktrace

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
