name: ios

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# iOS runs the same clean-room, GTK-free engine (libnordstjernen) Android does,
# driven from the UIKit host app in ios/App/ rather than GTK 4.
#
# Two jobs:
#   engine-portability — the iOS analogue of the Android source check:
#     cross-check every engine translation unit against the real iOS SDK
#     (device + simulator), catching iOS portability regressions early. Always
#     runs; needs no dependency sysroot.
#   app — cross-compile the engine against the prebuilt iOS dependency sysroot
#     and assemble the UIKit app for the simulator. Skips with a notice until
#     the sysroot is published by nordstjernen-dependencies-build's build-ios-deps
#     workflow (ios-sysroot-latest); see ios/README.md.
jobs:
  engine-portability:
    name: engine iOS source check on macos-${{ matrix.macos }}
    runs-on: macos-${{ matrix.macos }}
    timeout-minutes: 45

    env:
      HOMEBREW_NO_AUTO_UPDATE: '1'
      HOMEBREW_NO_INSTALL_CLEANUP: '1'
      HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: '1'

    strategy:
      fail-fast: false
      matrix:
        macos: ['26']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies (Homebrew)
        run: |
          brew install meson ninja pkg-config gtk4 libepoxy curl ccache \
              uchardet librsvg libpsl sqlite webp libavif sdl2
          # Homebrew curl is keg-only; put it on PKG_CONFIG_PATH so the desktop
          # configure resolves this OpenSSL libcurl (as the macOS job does).
          echo "PKG_CONFIG_PATH=$(brew --prefix curl)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/ccache
          key: ccache-ios-${{ matrix.macos }}-${{ github.sha }}
          restore-keys: |
            ccache-ios-${{ matrix.macos }}-

      - name: Configure ccache
        run: |
          ccache --max-size=200M
          ccache --zero-stats

      - name: Show toolchain versions
        run: |
          clang --version
          meson --version
          ninja --version
          xcodebuild -version || true
          echo "iphoneos SDK:        $(xcrun --sdk iphoneos --show-sdk-path)"
          echo "iphonesimulator SDK: $(xcrun --sdk iphonesimulator --show-sdk-path)"

      # meson setup + compile give us the engine's compile_commands.json plus the
      # generated headers (polyfills.h, wpt_hook.h) the engine translation units
      # include. The GTK shell and AI are left out — the iOS check only needs the
      # GTK-free engine sources. --werror keeps the desktop build honest too.
      - name: Build desktop engine (for compile_commands + generated headers)
        id: build
        if: hashFiles('meson.build') != ''
        shell: bash
        run: |
          set -o pipefail
          export CC="ccache clang"
          meson setup builddir --werror -Dgtk=disabled -Dai=disabled 2>&1 | tee build.log
          meson compile -C builddir 2>&1 | tee -a build.log

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Engine iOS source check (device / arm64-apple-ios)
        if: hashFiles('builddir/compile_commands.json') != ''
        run: ios/scripts/check-ios-sources.sh device builddir

      - name: Engine iOS source check (simulator / arm64-apple-ios-simulator)
        if: hashFiles('builddir/compile_commands.json') != ''
        run: ios/scripts/check-ios-sources.sh simulator builddir

      - name: Publish build log on failure
        if: failure() && hashFiles('build.log') != ''
        shell: bash
        run: |
          {
            echo '## iOS job build log (last 200 lines)'
            echo
            echo '```'
            tail -200 build.log
            echo '```'
            if [ -f builddir/meson-logs/meson-log.txt ]; then
              echo
              echo '## meson-log.txt (last 200 lines)'
              echo
              echo '```'
              tail -200 builddir/meson-logs/meson-log.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build log
        if: always() && hashFiles('build.log') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: build-log-ios-${{ matrix.macos }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 14

  app:
    name: assemble UIKit app (simulator)
    runs-on: macos-26
    timeout-minutes: 60

    env:
      HOMEBREW_NO_AUTO_UPDATE: '1'
      HOMEBREW_NO_INSTALL_CLEANUP: '1'
      HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: '1'
      # Where fetch-prebuilt-deps.sh lays out the sysroot.
      NORDSTJERNEN_IOS_SYSROOT: ${{ github.workspace }}/.ios-sysroot
      SYSROOT_REPO: nordstjernen-web/nordstjernen-dependencies-build
      SYSROOT_TAG: ios-sysroot-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The dependency sysroot is produced by a separate repo. Until its first
      # release is published, assemble-the-app is a no-op with a loud notice
      # rather than a red build; the engine-portability job above is the gate
      # that always runs.
      - name: Check for a published iOS sysroot
        id: sysroot
        run: |
          url="https://github.com/${SYSROOT_REPO}/releases/download/${SYSROOT_TAG}/SHA256SUMS"
          if curl -fsSL -I "$url" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::iOS dependency sysroot (${SYSROOT_TAG}) is not published yet — skipping app assembly. Run nordstjernen-dependencies-build's build-ios-deps workflow first."
          fi

      - name: Install build tools (Homebrew)
        if: steps.sysroot.outputs.available == 'true'
        run: brew install meson ninja pkg-config xcodegen

      - name: Fetch prebuilt iOS dependency sysroot
        if: steps.sysroot.outputs.available == 'true'
        run: ios/scripts/fetch-prebuilt-deps.sh --sysroot "$NORDSTJERNEN_IOS_SYSROOT"

      - name: Cross-compile the engine (device + simulator)
        if: steps.sysroot.outputs.available == 'true'
        run: |
          ios/scripts/build-engine.sh device
          # Build the simulator engine last so vendor/nordstjernen.xcconfig
          # points at the simulator libraries for the xcodebuild below.
          ios/scripts/build-engine.sh simulator

      - name: Generate the Xcode project
        if: steps.sysroot.outputs.available == 'true'
        working-directory: ios/App
        run: xcodegen generate

      - name: Build the app for the iOS Simulator (unsigned)
        if: steps.sysroot.outputs.available == 'true'
        working-directory: ios/App
        run: |
          set -o pipefail
          xcodebuild \
            -project Nordstjernen.xcodeproj \
            -scheme Nordstjernen \
            -sdk iphonesimulator \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log

      - name: Upload the built .app
        if: steps.sysroot.outputs.available == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: nordstjernen-ios-simulator-app
          path: ios/App/build/**/*.app
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload xcodebuild log
        if: always() && hashFiles('ios/App/xcodebuild.log') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-log
          path: ios/App/xcodebuild.log
          if-no-files-found: ignore
          retention-days: 14
