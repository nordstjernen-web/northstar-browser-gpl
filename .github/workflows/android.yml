name: android

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: assemble APK on ubuntu-26.04
    runs-on: ubuntu-26.04
    timeout-minutes: 45

    env:
      NDK_VERSION: '27.3.13750724'
      CMAKE_VERSION: '3.22.1'
      ANDROID_API: '34'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure sysroot path
        run: echo "NORDSTJERNEN_ANDROID_SYSROOT=${RUNNER_TEMP}/nordstjernen-android-sysroot" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install NDK, CMake and platform
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.14.5'

      - name: Show toolchain versions
        run: |
          java -version
          gradle --version
          echo "NDK: ${ANDROID_NDK_HOME}"

      - name: Fetch prebuilt dependency sysroots
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File android/scripts/fetch-prebuilt-deps.ps1 \
            -Abi arm64-v8a,x86_64 \
            -Sysroot "${NORDSTJERNEN_ANDROID_SYSROOT}"

      - name: Cross-compile engine
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq meson ninja-build pkg-config
          android/scripts/build-deps.sh arm64-v8a "${ANDROID_API}"
          android/scripts/build-deps.sh x86_64 "${ANDROID_API}"

      - name: Verify the engine was cross-compiled (no stub APK)
        run: |
          for abi in arm64-v8a x86_64; do
            so="android/app/src/main/jniLibs/$abi/libnordstjernen.so"
            test -f "$so" || { echo "missing $so — engine cross-compile failed; refusing to ship a stub APK"; exit 1; }
          done

      - name: Assemble debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name '*.apk' | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK
        if: steps.apk.outputs.path != ''
        uses: actions/upload-artifact@v7
        with:
          name: nordstjernen-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
