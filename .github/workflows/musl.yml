name: musl

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: musl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-26.04
    container: alpine:3.24
    timeout-minutes: 40
    steps:
      - name: Install build dependencies (musl)
        run: |
          apk add --no-cache \
            build-base clang ccache pkgconf meson ninja git cmake python3 \
            gtk4.0-dev curl-dev openssl-dev uchardet-dev libpsl-dev \
            sqlite-dev libavif-dev sdl2-dev librsvg-dev libseccomp-dev \
            fontconfig font-dejavu ca-certificates file

      - uses: actions/checkout@v6

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: /root/.cache/ccache
          key: ccache-musl-${{ github.sha }}
          restore-keys: |
            ccache-musl-

      - name: Configure ccache
        run: |
          ccache --max-size=200M
          ccache --zero-stats

      - name: Build (musl libc)
        run: |
          export CC="ccache clang"
          meson setup builddir
          meson compile -C builddir
          file builddir/src/gtk/northstar

      - name: ccache stats
        if: always()
        run: command -v ccache >/dev/null && ccache --show-stats || true

      - name: Headless smoke test (musl, no X server needed)
        env:
          NS_ALLOW_ROOT: '1'
        run: |
          ldd builddir/src/gtk/northstar | grep -i musl || true
          ./builddir/src/gtk/northstar \
            --headless --url=https://example.com --dump=text > smoke.txt
          head -40 smoke.txt
          grep -qi example smoke.txt
