name: freebsd

# BSD builds run in a VM nested inside the Linux runner (vmactions), which is
# slow, so they are dispatch-only (the nightly orchestrator drives them) rather
# than on every push/PR.
on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *'

concurrency:
  group: freebsd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: clang on FreeBSD
    runs-on: ubuntu-26.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build, smoke and pack in a FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: '14.2'
          usesh: true
          copyback: true
          prepare: |
            pkg install -y \
              meson ninja pkgconf bash zip ccache bzip2 \
              gtk4 libepoxy curl uchardet librsvg2 webp libavif sdl2 \
              sqlite3 libpsl
            # FreeBSD's freetype2.pc lists 'bzip2' in Requires.private, but
            # neither the base system nor the bzip2 package ships a bzip2.pc,
            # so cairo's pkg-config lookup (which pulls in freetype2) aborts
            # meson setup. libbz2 lives in the base system; drop a matching
            # .pc into the pkgconf search path so the dependency resolves.
            mkdir -p /usr/local/libdata/pkgconfig
            printf '%s\n' \
              'prefix=/usr' \
              'libdir=${prefix}/lib' \
              'includedir=${prefix}/include' \
              '' \
              'Name: bzip2' \
              'Description: bzip2 compression library' \
              'Version: 1.0.8' \
              'Libs: -L${libdir} -lbz2' \
              'Cflags: -I${includedir}' \
              > /usr/local/libdata/pkgconfig/bzip2.pc
          run: |
            set -e
            export CC="ccache cc"
            export CXX="ccache c++"
            # AI (llama.cpp) is a CMake subproject; skip it on the BSD VM
            # builds to avoid the extra toolchain and a long C++ compile.
            meson setup builddir --buildtype=release -Db_ndebug=true -Dai=disabled
            meson compile -C builddir
            if ./builddir/src/gtk/nordstjernen --headless --dump=text about:start > about.txt 2>/dev/null \
               && grep -q Nordstjernen about.txt; then
              echo "headless smoke: ok"
            else
              echo "headless smoke: skipped"
            fi
            bash ./scripts/pack-bsd.sh freebsd
            ls -l dist/*-freebsd-x86_64.zip
            rm -rf builddir

      - name: Upload FreeBSD portable zip
        if: hashFiles('dist/*-freebsd-x86_64.zip') != ''
        uses: actions/upload-artifact@v7
        with:
          name: nordstjernen-freebsd-x86_64
          path: dist/*-freebsd-x86_64.zip
          if-no-files-found: error
          retention-days: 14
