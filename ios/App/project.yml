# XcodeGen project definition for the Nordstjernen iOS host app.
#
# Generate the .xcodeproj with:  xcodegen generate  (run in this directory)
#
# The engine is not compiled here: ios/scripts/build-engine.sh cross-compiles
# libnordstjernen.a plus its dependency sysroot and writes vendor/ and the
# generated vendor/nordstjernen.xcconfig (header/library search paths and the
# linker flags) that this project includes. Run build-engine.sh before opening
# or building the project.

name: Nordstjernen
options:
  bundleIdPrefix: org.nordstjernen
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

configFiles:
  Debug: vendor/nordstjernen.xcconfig
  Release: vendor/nordstjernen.xcconfig

targets:
  Nordstjernen:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bridge
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.nordstjernen.WebBrowser
        INFOPLIST_FILE: Resources/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Bridge/Nordstjernen-Bridging-Header.h
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_BITCODE: NO
        CLANG_ENABLE_MODULES: YES
        # The engine and its dependency sysroot are cross-compiled arm64-only
        # (build-engine.sh, for both device and simulator), so restrict the
        # simulator build to arm64. An Intel-simulator (x86_64) slice has no
        # objects to link and fails with undefined engine symbols.
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        # HEADER_SEARCH_PATHS, LIBRARY_SEARCH_PATHS and OTHER_LDFLAGS come from
        # the generated vendor/nordstjernen.xcconfig (see build-engine.sh).
